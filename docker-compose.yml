services:

  postgres:
    image: postgres:16
    container_name: prosaude-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: prosaude_db
      POSTGRES_USER: pro_user
      POSTGRES_PASSWORD: SenhaSegura123!

    ports:
      - "5434:5432"

    volumes:
      - prosaude_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4
    container_name: prosaude-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@prosaude.local
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  prosaude_data: